# docker-compose.yml — Agent KPI Dashboard
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-dashboard:latest
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # OpenClaw session data (read-only)
      - ~/.openclaw/agents/main/sessions/sessions.db:/data/sessions.db:ro
      # Agent-cabinet logs for KPIs (read-only) — must match process.env.HOME inside container
      - ~/.openclaw/workspace/agent-cabinet/logs:/root/.openclaw/workspace/agent-cabinet/logs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
