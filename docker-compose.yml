services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-dashboard:latest
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # OpenClaw agents directory (read-only) — needed for HUD session tracking
      - ~/.openclaw/agents:/root/.openclaw/agents:ro
      # Agent-cabinet logs for KPIs (read-only)
      - ~/.openclaw/workspace/agent-cabinet/logs:/root/.openclaw/workspace/agent-cabinet/logs:ro
      # Insight data (written by host cron job, read by dashboard)
      - ~/Developer/agent-dashboard/data:/root/.openclaw/workspace/agent-dashboard/data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
